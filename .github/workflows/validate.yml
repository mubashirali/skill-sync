name: Validate Skills

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Validate skill structure and frontmatter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skills
        run: |
          set -euo pipefail

          SKILLS_DIR="skills"
          errors=0
          count=0

          if [ ! -d "$SKILLS_DIR" ]; then
            echo "ERROR: skills/ directory not found"
            exit 1
          fi

          for skill_dir in "$SKILLS_DIR"/*/; do
            [ -d "$skill_dir" ] || continue
            skill_name=$(basename "$skill_dir")
            echo "Checking: $skill_name"

            # 1. Must have SKILL.md
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "  ERROR: Missing SKILL.md in $skill_dir"
              (( errors++ )) || true
              continue
            fi

            skill_file="$skill_dir/SKILL.md"

            # 2. Must have YAML frontmatter (opening ---)
            if ! head -1 "$skill_file" | grep -q "^---$"; then
              echo "  ERROR: $skill_name/SKILL.md missing YAML frontmatter (must start with ---)"
              (( errors++ )) || true
              continue
            fi

            # 3. Must have 'name' field in frontmatter
            if ! awk '/^---/{c++} c==1 && /^name:/{found=1} END{exit !found}' "$skill_file"; then
              echo "  ERROR: $skill_name/SKILL.md missing 'name' field in frontmatter"
              (( errors++ )) || true
            fi

            # 4. name must only contain letters, numbers, hyphens
            name_val=$(awk '/^---/{c++} c==1 && /^name:/{sub(/^name: */,""); print; exit}' "$skill_file")
            if ! echo "$name_val" | grep -qE '^[a-zA-Z0-9-]+$'; then
              echo "  ERROR: $skill_name/SKILL.md — name '$name_val' contains invalid characters (only letters, numbers, hyphens allowed)"
              (( errors++ )) || true
            fi

            # 5. Must have 'description' field in frontmatter
            if ! awk '/^---/{c++} c==1 && /^description:/{found=1} END{exit !found}' "$skill_file"; then
              echo "  ERROR: $skill_name/SKILL.md missing 'description' field in frontmatter"
              (( errors++ )) || true
            fi

            # 6. Total frontmatter must be under 1024 characters
            frontmatter=$(awk '/^---/{c++; if(c==2) exit} c==1' "$skill_file")
            fm_len=${#frontmatter}
            if [ "$fm_len" -gt 1024 ]; then
              echo "  ERROR: $skill_name/SKILL.md frontmatter exceeds 1024 characters ($fm_len chars)"
              (( errors++ )) || true
            fi

            # 7. description must not be empty
            desc_val=$(awk '/^---/{c++} c==1 && /^description:/{sub(/^description: */,""); print; exit}' "$skill_file")
            if [ -z "$desc_val" ]; then
              echo "  ERROR: $skill_name/SKILL.md — description field is empty"
              (( errors++ )) || true
            fi

            echo "  OK"
            (( count++ )) || true
          done

          echo ""
          echo "─────────────────────────────"
          echo "Skills checked: $count"

          if [ "$errors" -gt 0 ]; then
            echo "Errors found: $errors"
            exit 1
          else
            echo "All skills are valid!"
          fi
